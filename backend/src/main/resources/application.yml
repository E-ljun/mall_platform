server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mall-content-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mall_content}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=${DB_SSL:false}&requireSSL=${DB_SSL:false}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:xyz567}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 55MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

mall:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-in-production-min-32-chars}
    expire-hours: 24
  storage:
    root: ${STORAGE_ROOT:./storage}
    public-url-prefix: /api/files
    allowed-mime-types: image/jpeg,image/png,image/webp
    max-images-per-product: 10
    max-image-size-bytes: 5242880
  cors:
    allowed-origin-patterns: ${CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  ai:
    default-provider: dashscope
    providers:
      dashscope:
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${DASHSCOPE_API_KEY:}
        vision-model: qwen3-vl-plus
        text-model: qwen3-vl-plus
        image-model: wan2.7-image-pro
      deepseek:
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_API_KEY:}
        text-model: deepseek-chat
    routing:
      product-description: dashscope
      marketing-copy: dashscope
      fallback-text: deepseek

springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
