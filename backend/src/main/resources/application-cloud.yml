# =============================================================
# TiDB Cloud Serverless 配置
# 使用方法: 设置环境变量 SPRING_PROFILES_ACTIVE=cloud
# =============================================================
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:4000}/${DB_NAME:mall_content}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&requireSSL=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}
